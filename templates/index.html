<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransTracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 32px;
    }

    header { margin-bottom: 32px; }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    header p { font-size: 14px; color: #888; margin-top: 4px; }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .month-nav button {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      color: #333;
    }

    .month-nav button:hover { background: #f0f0f0; }
    .month-nav span { font-size: 15px; font-weight: 500; min-width: 112px; text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e8e8e8;
      padding: 24px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
      margin-bottom: 20px;
    }

    .unknown-card {
      margin-top: 24px;
      border-color: #f59e0b44;
    }

    .unknown-card h2 { color: #b45309; }

    .unknown-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fef3c7;
      color: #b45309;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .chart-wrap { position: relative; max-width: 260px; margin: 0 auto; }

    .chart-total {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .chart-total .amount { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .chart-total .label { font-size: 12px; color: #999; }

    .legend { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }

    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    .legend-left { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { color: #333; }
    .legend-amount { font-weight: 500; color: #1a1a1a; }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 380px;
      overflow-y: auto;
    }

    .tx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 14px;
    }

    .tx-left { display: flex; flex-direction: column; gap: 2px; }
    .tx-name { font-weight: 500; }
    .tx-meta { font-size: 12px; color: #999; }

    .tx-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .tx-amount { font-weight: 600; white-space: nowrap; margin-left: 12px; }

    .unknown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 14px;
      gap: 12px;
    }

    .unknown-name { font-weight: 500; font-size: 13px; word-break: break-all; }
    .unknown-meta { font-size: 12px; color: #92400e; margin-top: 2px; }

    .label-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .label-row select {
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    .label-btn {
      font-size: 13px;
      padding: 4px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    .label-btn:hover { background: #f0fdf4; border-color: #86efac; color: #166534; }
    .label-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty { color: #bbb; font-size: 0.875rem; text-align: center; padding: 2rem 0; }
  </style>
</head>
<body>

<header>
  <h1>TransTracker</h1>
  <p>Havi kiadások kategóriánként</p>
</header>

<div class="month-nav">
  <button onclick="changeMonth(-1)">&#8592;</button>
  <span id="month-label"></span>
  <button onclick="changeMonth(1)">&#8594;</button>
</div>

<div class="grid">
  <div class="card">
    <h2>Kategóriák</h2>
    <div class="chart-wrap">
      <canvas id="pie"></canvas>
      <div class="chart-total">
        <div class="amount" id="total-amount">—</div>
        <div class="label">összesen</div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="card">
    <h2>Tranzakciók</h2>
    <div class="tx-list" id="tx-list"></div>
  </div>
</div>

<div class="card unknown-card" id="unknown-section" style="display:none">
  <h2>Ismeretlen kategóriák <span class="unknown-badge" id="unknown-count">0</span></h2>
  <div class="tx-list" id="unknown-list"></div>
</div>

<script>
  const COLORS = [
    '#6366f1','#14b8a6','#f59e0b','#ef4444','#8b5cf6',
    '#06b6d4','#10b981','#f97316','#ec4899','#64748b'
  ];

  const CATEGORIES = [
    'Élelmiszer','Vendéglátás','Közlekedés','Szórakozás','Sport',
    'Rezsi','Online vásárlás','Egészség','Lakhatás','Utazás',
    'Drogéria','Készpénz','Átutalás','Egyéb'
  ];

  let chart = null;
  let currentDate = new Date();

  function monthKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function monthLabel(d) {
    return d.toLocaleDateString('hu-HU', { year: 'numeric', month: 'long' });
  }

  function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    load();
  }

  async function load() {
    document.getElementById('month-label').textContent = monthLabel(currentDate);
    const month = monthKey(currentDate);

    const [summaryRes, txRes] = await Promise.all([
      fetch(`/summary?month=${month}`),
      fetch('/transactions')
    ]);

    const summary = await summaryRes.json();
    const txAll   = await txRes.json();

    renderChart(summary);
    renderTransactions(txAll, month);
    renderUnknown(txAll);
  }

  function renderChart(summary) {
    const labels  = Object.keys(summary).filter(k => k !== 'Ismeretlen');
    const amounts = labels.map(k => summary[k]['összeg']);
    const total   = amounts.reduce((a, b) => a + b, 0);

    document.getElementById('total-amount').textContent =
      total > 0 ? total.toLocaleString('hu-HU') + ' Ft' : '—';

    const legend = document.getElementById('legend');
    legend.innerHTML = '';

    if (labels.length === 0) {
      legend.innerHTML = '<div class="empty">Nincs adat erre a hónapra.</div>';
    } else {
      labels.forEach((lbl, i) => {
        const pct = total > 0 ? Math.round(amounts[i] / total * 100) : 0;
        legend.innerHTML += `
          <div class="legend-item">
            <div class="legend-left">
              <div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div>
              <span class="legend-name">${lbl}</span>
            </div>
            <span class="legend-amount">${amounts[i].toLocaleString('hu-HU')} Ft <span style="color:#bbb;font-weight:400">(${pct}%)</span></span>
          </div>`;
      });
    }

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('pie'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: amounts.length ? amounts : [1],
          backgroundColor: amounts.length ? labels.map((_, i) => COLORS[i % COLORS.length]) : ['#e8e8e8'],
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        cutout: '72%',
        plugins: { legend: { display: false }, tooltip: { enabled: !!amounts.length } },
        animation: { duration: 400 }
      }
    });
  }

  function renderTransactions(txAll, month) {
    const list = document.getElementById('tx-list');
    const rows = Object.values(txAll)
      .filter(r => r.datum.startsWith(month) && r.kategoria !== 'Ismeretlen')
      .sort((a, b) => b.datum.localeCompare(a.datum));

    if (rows.length === 0) {
      list.innerHTML = '<div class="empty">Nincs tranzakció ebben a hónapban.</div>';
      return;
    }

    const cats = [...new Set(rows.map(r => r.kategoria))];
    const catIndex = Object.fromEntries(cats.map((c, i) => [c, i]));

    list.innerHTML = rows.map(r => {
      const color = COLORS[catIndex[r.kategoria] % COLORS.length];
      return `
        <div class="tx-item">
          <div class="tx-left">
            <span class="tx-name">${r.targy}</span>
            <span class="tx-meta">${r.datum.slice(0,10)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
            <span class="tx-badge" style="background:${color}22;color:${color}">${r.kategoria}</span>
            <span class="tx-amount">${r.osszeg.toLocaleString('hu-HU')} Ft</span>
          </div>
        </div>`;
    }).join('');
  }

  function renderUnknown(txAll) {
    const rows = Object.values(txAll)
      .filter(r => r.kategoria === 'Ismeretlen')
      .sort((a, b) => b.datum.localeCompare(a.datum));

    const section = document.getElementById('unknown-section');
    const list    = document.getElementById('unknown-list');
    const badge   = document.getElementById('unknown-count');

    if (rows.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    badge.textContent = rows.length;

    const opts = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

    list.innerHTML = rows.map(r => `
      <div class="unknown-item" id="ui-${r.id}">
        <div class="tx-left">
          <span class="unknown-name">${r.targy}</span>
          <span class="unknown-meta">${r.datum.slice(0,10)} &middot; ${r.osszeg.toLocaleString('hu-HU')} Ft</span>
        </div>
        <div class="label-row">
          <select id="sel-${r.id}">${opts}</select>
          <button class="label-btn" onclick="labelTx(${r.id}, '${r.targy.replace(/'/g,"\\'")}')">Mentés ↗</button>
        </div>
      </div>`).join('');
  }

  async function labelTx(id, subject) {
    const sel = document.getElementById(`sel-${id}`);
    const btn = sel.nextElementSibling;
    const category = sel.value;

    btn.disabled = true;
    btn.textContent = '...';

    const res = await fetch('/label', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject, category })
    });

    if (res.ok) {
      document.getElementById(`ui-${id}`).remove();
      const remaining = document.querySelectorAll('[id^="ui-"]').length;
      document.getElementById('unknown-count').textContent = remaining;
      if (remaining === 0) document.getElementById('unknown-section').style.display = 'none';
      load();
    } else {
      btn.disabled = false;
      btn.textContent = 'Mentés ↗';
    }
  }

  load();
</script>
</body>
</html>
